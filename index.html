<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- App 專屬設定開始 (PWA Meta Tags) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="搜搜穿搭">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f8fafc">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3159/3159614.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3159/3159614.png">

    <title>搜搜穿搭</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            overscroll-behavior-y: none; 
        }
        
        .clean-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 2px 4px -1px rgba(0,0,0,0.02);
        }

        .upload-zone {
            border: 1px dashed #cbd5e1;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #64748b;
            background-color: #f1f5f9;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        
        .history-card { transition: all 0.2s ease; border: 1px solid #e2e8f0; }
        .history-card:hover { border-color: #94a3b8; background-color: #f8fafc; transform: translateX(2px); }

        .tier-card {
            border-left: 4px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .tier-authentic { border-left-color: #dc2626; background-color: #fffafb; }
        .tier-replica { border-left-color: #2563eb; background-color: #f8faff; }
        .tier-similar { border-left-color: #64748b; background-color: #fcfcfc; }
    </style>
</head>
<body class="p-4 md:p-8 relative">

    <!-- 專屬金鑰登入畫面 -->
    <div id="apiKeyModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 transform transition-all">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-100">
                    <i class="fa-solid fa-shield-halved text-2xl text-blue-500"></i>
                </div>
                <h3 class="text-2xl font-black text-slate-900 mb-2">專屬通行證設定</h3>
                <p class="text-sm text-slate-500 leading-relaxed">
                    為了保護系統額度，請輸入您的專屬 AI 金鑰。<br>
                    <span class="text-xs text-slate-400">（金鑰將安全儲存在您的手機中，離開網頁也不會消失）</span>
                </p>
            </div>
            <div class="mb-6">
                <input type="password" id="apiKeyInput" placeholder="請貼上 AIzaSy 開頭的金鑰..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none transition-all text-sm font-mono text-center shadow-inner">
            </div>
            <button onclick="saveApiKeyFromModal()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl transition-all shadow-md hover:shadow-lg flex items-center justify-center">
                <i class="fa-solid fa-lock-open mr-2"></i> 儲存並解鎖 App
            </button>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toastMsg" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-3.5 rounded-full text-sm font-bold shadow-xl transition-all duration-300 opacity-0 pointer-events-none z-[100] flex items-center whitespace-nowrap">
        <i class="fa-solid fa-circle-check mr-2 text-green-400" id="toastIcon"></i> <span id="toastText">訊息</span>
    </div>

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-10 mt-4 flex flex-col md:flex-row md:items-end justify-between border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight flex items-center">
                    <i class="fa-solid fa-layer-group text-slate-400 mr-3 text-2xl"></i>搜搜穿搭
                    <span class="ml-4 text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-bold shadow-sm border border-blue-200 tracking-normal">v2.1 智慧尋軌版</span>
                </h1>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Column: Input & Results -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Input Section -->
                <div class="clean-panel p-6 md:p-8">
                    <h2 class="text-lg font-bold mb-5 flex items-center text-slate-800">
                        <span class="bg-slate-100 text-slate-500 w-7 h-7 rounded-md flex items-center justify-center mr-3 text-xs border border-slate-200">1</span>
                        上傳穿搭影像
                    </h2>
                    
                    <div id="dropZone" class="upload-zone rounded-xl p-8 flex flex-col items-center justify-center text-center cursor-pointer relative min-h-[220px]" onclick="document.getElementById('fileInput').click()">
                        <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                        
                        <div id="uploadPrompt" class="space-y-3 pointer-events-none">
                            <i class="fa-regular fa-image text-4xl text-slate-300"></i>
                            <p class="text-slate-600 font-medium">點擊上傳，或 <kbd class="bg-white border border-slate-200 shadow-sm px-2 py-1 rounded text-xs mx-1 font-mono">Ctrl+V</kbd> 貼上截圖</p>
                            <p class="text-xs text-slate-400">支援 JPG, PNG 格式（會自動壓縮大圖片）</p>
                        </div>

                        <div id="imagePreviewContainer" class="hidden w-full relative">
                            <img id="imagePreview" class="max-h-64 mx-auto rounded-md shadow-sm object-contain border border-slate-200" src="" alt="預覽圖片">
                            <button onclick="clearImage(event)" class="absolute top-2 right-2 bg-white text-slate-600 border border-slate-200 rounded-full w-8 h-8 flex items-center justify-center hover:bg-slate-100 transition-colors shadow-sm">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mt-4">
                        <input type="text" id="userInputText" class="w-full p-3.5 bg-white border border-slate-200 rounded-lg focus:ring-1 focus:ring-slate-400 focus:border-slate-400 outline-none transition-all text-sm placeholder-slate-400" placeholder="（選填）想特別找哪件單品？例如：黑色西裝外套...">
                    </div>

                    <button id="analyzeBtn" onclick="startAnalysis()" class="mt-5 w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3.5 px-6 rounded-lg transition-colors flex justify-center items-center shadow-sm">
                        <i class="fa-solid fa-magnifying-glass mr-2 text-sm opacity-80"></i> <span id="btnText">開始搜尋同款</span>
                    </button>
                </div>

                <!-- Result Section -->
                <div class="clean-panel p-6 md:p-8 min-h-[400px] flex flex-col">
                    <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                        <h2 class="text-lg font-bold flex items-center text-slate-800">
                            <span class="bg-slate-100 text-slate-500 w-7 h-7 rounded-md flex items-center justify-center mr-3 text-xs border border-slate-200">2</span>
                            分析報告
                        </h2>
                        <span id="autoSaveIndicator" class="hidden text-slate-500 font-medium text-xs flex items-center bg-slate-50 px-2.5 py-1.5 rounded-md border border-slate-200">
                            <i class="fa-solid fa-check mr-1.5"></i> 已自動分類儲存
                        </span>
                    </div>
                    
                    <div id="resultArea" class="flex-grow prose prose-slate max-w-none text-slate-600 leading-relaxed whitespace-pre-wrap text-sm md:text-base">
                        <div class="h-full flex flex-col items-center justify-center text-slate-300 py-12">
                            <i class="fa-solid fa-barcode text-4xl mb-4 font-light opacity-50"></i>
                            <p class="text-sm font-medium text-slate-400">等待載入影像進行分析</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: History -->
            <div class="lg:col-span-4">
                <div class="clean-panel p-6 h-full flex flex-col max-h-[850px]">
                    <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                        <h2 class="text-lg font-bold flex items-center text-slate-800">衣櫥分類紀錄</h2>
                        <div class="space-x-2">
                            <button onclick="resetApiKey()" class="text-xs text-slate-400 hover:text-blue-500 transition-colors font-medium"><i class="fa-solid fa-lock mr-1"></i>重設</button>
                            <button onclick="clearHistory()" class="text-xs text-slate-400 hover:text-red-500 transition-colors font-medium"><i class="fa-solid fa-trash-can mr-1"></i>清空</button>
                        </div>
                    </div>
                    <div id="historyList" class="flex-grow overflow-y-auto custom-scrollbar pr-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('gemini_api_key') || "";
        let currentAnalysisResult = "";
        let selectedImageBase64 = null;
        let selectedImageMimeType = null;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toastMsg');
            const toastText = document.getElementById('toastText');
            toastText.innerText = msg;
            if (isError) {
                toast.classList.replace('bg-slate-900', 'bg-red-600');
            } else {
                toast.classList.replace('bg-red-600', 'bg-slate-900');
            }
            toast.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => toast.classList.add('opacity-0', 'pointer-events-none'), 3000);
        }

        function copyKeyword(btn, text) {
            const el = document.createElement('textarea');
            el.value = text.trim();
            document.body.appendChild(el);
            el.select();
            try {
                document.execCommand('copy');
                showToast('✅ 關鍵字複製成功！');
                const old = btn.innerHTML;
                btn.innerHTML = '已複製';
                setTimeout(() => btn.innerHTML = old, 2000);
            } catch (e) {
                showToast('❌ 複製失敗', true);
            }
            document.body.removeChild(el);
        }

        function showApiKeyModal() { document.getElementById('apiKeyModal').classList.remove('hidden'); }
        function hideApiKeyModal() { document.getElementById('apiKeyModal').classList.add('hidden'); }

        function saveApiKeyFromModal() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if(val.startsWith("AIzaSy")) {
                apiKey = val;
                localStorage.setItem('gemini_api_key', apiKey);
                hideApiKeyModal();
                showToast("✅ 通行證解鎖成功！");
            } else {
                alert("⛔ 格式錯誤：金鑰必須是 AIzaSy 開頭喔！");
            }
        }

        function checkAndGetApiKey() {
            if (!apiKey || !apiKey.startsWith("AIzaSy")) {
                showApiKeyModal();
                return false;
            }
            return true;
        }

        function resetApiKey() {
            if (confirm("確定要重設金鑰嗎？")) {
                localStorage.removeItem('gemini_api_key');
                apiKey = "";
                showApiKeyModal();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderHistory();
            if (!apiKey || !apiKey.startsWith("AIzaSy")) showApiKeyModal();

            window.addEventListener('paste', e => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let index in items) {
                    const item = items[index];
                    if (item.kind === 'file' && item.type.includes('image/')) {
                        processImageFile(item.getAsFile());
                    }
                }
            });

            const dropZone = document.getElementById('dropZone');
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                if (e.dataTransfer.files && e.dataTransfer.files[0]) processImageFile(e.dataTransfer.files[0]);
            });
        });

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) processImageFile(file);
        }

        function processImageFile(file) {
            if (!file.type.match('image.*')) {
                showToast('⚠️ 請上傳正確的圖片檔案', true);
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 1024;
                    let width = img.width;
                    let height = img.height;

                    if (width > height && width > MAX_SIZE) {
                        height *= MAX_SIZE / width;
                        width = MAX_SIZE;
                    } else if (height > MAX_SIZE) {
                        width *= MAX_SIZE / height;
                        height = MAX_SIZE;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    selectedImageBase64 = dataUrl.split(',')[1];
                    selectedImageMimeType = 'image/jpeg';
                    
                    document.getElementById('imagePreview').src = dataUrl;
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                    document.getElementById('uploadPrompt').classList.add('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function clearImage(event) {
            event.stopPropagation();
            selectedImageBase64 = null;
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            document.getElementById('uploadPrompt').classList.remove('hidden');
        }

        function formatAnalysisResult(text) {
            let formatted = text;
            formatted = formatted.replace(/(🌟 【整體風格】|👗 【單品.*?】)/g, '<h3 class="text-slate-800 font-bold text-lg mt-6 mb-3 border-b pb-2">$1</h3>');
            formatted = formatted.replace(/- 分類：(.*)/g, '<div class="mt-2 text-sm"><span class="font-bold text-slate-400">分類：</span>$1</div>');
            formatted = formatted.replace(/- 最低估價：(.*)/g, '<div class="mt-1 text-sm"><span class="font-bold text-slate-400">估價：</span>NT$ $1</div>');
            formatted = formatted.replace(/- 特徵：(.*)/g, '<div class="mt-1 text-sm mb-4"><span class="font-bold text-slate-400">特徵：</span>$1</div>');
            
            const renderBtn = (type, icon, cls, label) => {
                const regex = new RegExp(`${type}關鍵字：(.*)`, 'g');
                formatted = formatted.replace(regex, (match, keyword) => {
                    const cleanKeyword = keyword.trim();
                    const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(cleanKeyword)}`;
                    
                    return `
                    <div class="tier-card ${cls} p-3 rounded-lg mb-2 flex flex-col sm:flex-row sm:items-center justify-between shadow-sm border border-slate-100 gap-3">
                        <div class="flex-grow min-w-0">
                            <div class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-1"><i class="fa-solid ${icon} mr-1"></i>${label}</div>
                            <div class="text-sm font-bold text-slate-700 truncate" title="${cleanKeyword}">${cleanKeyword}</div>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button onclick="copyKeyword(this, '${cleanKeyword}')" class="bg-slate-200 text-slate-700 hover:bg-slate-300 px-3 py-1.5 rounded text-xs font-medium transition-colors shadow-sm whitespace-nowrap">複製</button>
                            <a href="${searchUrl}" target="_blank" class="bg-slate-900 text-white hover:bg-slate-800 px-3 py-1.5 rounded text-xs font-medium transition-colors shadow-sm flex items-center whitespace-nowrap">
                                <i class="fa-solid fa-magnifying-glass mr-1.5"></i>去搜尋
                            </a>
                        </div>
                    </div>`;
                });
            };

            renderBtn('👑 正版', 'fa-crown', 'tier-authentic', 'Authentic');
            renderBtn('💎 平替', 'fa-gem', 'tier-replica', 'Best Value');
            renderBtn('🏷️ 類似', 'fa-tag', 'tier-similar', 'Similar');

            formatted = formatted.replace(/---/g, '<div class="my-6 border-t border-slate-100"></div>');
            return formatted;
        }

        async function startAnalysis() {
            if (!checkAndGetApiKey()) return;
            if (!selectedImageBase64) { showToast("⚠️ 請先上傳圖片！", true); return; }

            const btnText = document.getElementById('btnText');
            const resultArea = document.getElementById('resultArea');
            const analyzeBtn = document.getElementById('analyzeBtn');

            analyzeBtn.disabled = true;
            btnText.innerHTML = `正在執行全網檢索<span class="loading-dots"></span>`;
            resultArea.innerHTML = `<div class="py-10 text-center text-slate-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i>AI 正在辨識您的單品...</div>`;

            const promptText = `
                你是一位穿搭分析師。請拆解圖片中的「單品」。
                ⚠️ 嚴格禁止提供任何 URL 網址。
                請針對每個單品，提供 3 個等級的搜尋關鍵字：
                1. 👑 【正版品牌】：原始品牌名或同款式精品關鍵字。
                2. 💎 【高仿平替】：外觀極度相似且CP值高的同款關鍵字。
                3. 🏷️ 【類似風格】：大眾品牌或平價的相似風格關鍵字。

                格式必須如下（完全不要改標題與符號）：
                🌟 【整體風格】
                （一句話總結）

                --- 單品分析 ---
                👗 【單品一：名稱】
                - 分類：[外套/長袖/短袖/長褲/短褲/裙裝/鞋子/包包/配件]
                - 最低估價：[純數字]
                - 特徵：[特徵描述]
                
                👑 正版關鍵字：[品牌名與完整品名]
                💎 平替關鍵字：[韓版/日系 同款描述]
                🏷️ 類似關鍵字：[大眾相似款關鍵字]
                ---
            `;

            try {
                // 建立智慧備用模型清單，自動尋找您的金鑰支援的模型
                const modelsToTry = ['gemini-1.5-flash', 'gemini-1.5-flash-latest', 'gemini-1.5-pro', 'gemini-1.5-pro-latest', 'gemini-pro-vision'];
                let apiResponse = null;
                let data = null;

                for (const modelName of modelsToTry) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ 
                                    role: "user",
                                    parts: [
                                        { text: promptText + (document.getElementById('userInputText').value || "") }, 
                                        { inlineData: { mimeType: selectedImageMimeType, data: selectedImageBase64 } }
                                    ] 
                                }],
                                safetySettings: [
                                    { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_ONLY_HIGH" },
                                    { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_ONLY_HIGH" },
                                    { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_ONLY_HIGH" },
                                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_ONLY_HIGH" }
                                ]
                            })
                        });
                        
                        const resData = await res.json();
                        
                        // 如果這個模型成功了，就儲存結果並跳出迴圈
                        if (res.ok) {
                            apiResponse = res;
                            data = resData;
                            break; 
                        } else {
                            // 紀錄錯誤，繼續嘗試名單上的下一個模型
                            data = resData;
                        }
                    } catch (e) {
                        console.error(`連線 ${modelName} 發生異常:`, e);
                    }
                }

                // 如果全部模型都失敗了
                if (!apiResponse || !apiResponse.ok) {
                    throw new Error(data?.error?.message || "API 請求失敗，請確認您的金鑰是否有效或過期。");
                }

                if (data.promptFeedback && data.promptFeedback.blockReason) {
                    throw new Error("圖片可能被 AI 安全機制阻擋，請換一張照片試試看！");
                }
                if (!data.candidates || data.candidates.length === 0) {
                    throw new Error("AI 無法辨識此圖片內容，請換一張照片試試看！");
                }

                currentAnalysisResult = data.candidates[0].content.parts[0].text;
                resultArea.innerHTML = formatAnalysisResult(currentAnalysisResult);
                saveToHistory();

            } catch (err) {
                resultArea.innerHTML = `<div class="p-5 bg-red-50 text-red-600 rounded-xl border border-red-100 shadow-sm flex flex-col items-center text-center"><i class="fa-solid fa-circle-exclamation text-2xl mb-2"></i><b>糟糕！發生了一點錯誤</b><span class="text-sm mt-1 opacity-80">${err.message}</span></div>`;
            } finally {
                analyzeBtn.disabled = false;
                btnText.innerText = "開始搜尋同款";
            }
        }

        function saveToHistory() {
            if (!currentAnalysisResult) return;
            const historyArray = JSON.parse(localStorage.getItem('fashionAppHistory') || '[]');
            const firstItemMatch = currentAnalysisResult.match(/👗\s*【單品.*?：(.*?)】/);
            const title = firstItemMatch ? firstItemMatch[1] : "新搜尋紀錄";
            const catMatch = currentAnalysisResult.match(/- 分類：(.*?)\n/);
            const priceMatch = currentAnalysisResult.match(/- 最低估價：(\d+)/);

            if(historyArray.length > 0 && historyArray[0].content === currentAnalysisResult) return;

            historyArray.unshift({
                id: Date.now(),
                title: title,
                category: catMatch ? catMatch[1].trim() : "未分類",
                price: priceMatch ? parseInt(priceMatch[1]) : 0,
                content: currentAnalysisResult,
                date: new Date().toLocaleString('zh-TW', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
            });
            localStorage.setItem('fashionAppHistory', JSON.stringify(historyArray));
            renderHistory();
        }

        function renderHistory() {
            const historyArray = JSON.parse(localStorage.getItem('fashionAppHistory') || '[]');
            const historyList = document.getElementById('historyList');
            if (historyArray.length === 0) {
                historyList.innerHTML = `<p class="text-center text-slate-300 py-10 text-sm">尚無紀錄</p>`;
                return;
            }
            historyList.innerHTML = historyArray.map(item => `
                <div class="history-card bg-white p-3 rounded-lg cursor-pointer mb-2 group flex justify-between items-center" onclick="viewHistory(${item.id})">
                    <div class="truncate">
                        <div class="font-bold text-sm text-slate-700">${item.title}</div>
                        <div class="text-[10px] text-slate-400 mt-1">NT$ ${item.price.toLocaleString()} • ${item.date}</div>
                    </div>
                    <button onclick="deleteHistory(event, ${item.id})" class="text-slate-300 hover:text-red-500 p-2"><i class="fa-solid fa-xmark"></i></button>
                </div>
            `).join('');
        }

        function viewHistory(id) {
            const historyArray = JSON.parse(localStorage.getItem('fashionAppHistory') || '[]');
            const item = historyArray.find(x => x.id === id);
            if (item) {
                document.getElementById('resultArea').innerHTML = `<div class="mb-4 bg-slate-50 p-2 text-[10px] font-bold text-slate-400 rounded-md inline-block shadow-sm"><i class="fa-solid fa-clock-rotate-left mr-1"></i>正在檢視歷史紀錄</div>` + formatAnalysisResult(item.content);
                document.getElementById('resultArea').parentElement.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function deleteHistory(event, id) {
            event.stopPropagation();
            let historyArray = JSON.parse(localStorage.getItem('fashionAppHistory') || '[]');
            historyArray = historyArray.filter(x => x.id !== id);
            localStorage.setItem('fashionAppHistory', JSON.stringify(historyArray));
            renderHistory();
        }

        function clearHistory() {
            if (confirm("清空所有紀錄？")) {
                localStorage.removeItem('fashionAppHistory');
                renderHistory();
            }
        }
    </script>
</body>
</html>
